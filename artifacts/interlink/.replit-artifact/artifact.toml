kind = "web"
previewPath = "/"
title = "InterLink"
version = "1.0.0"
id = "artifacts/interlink"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25443

[services.development]
run = "pnpm --filter @workspace/interlink run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/interlink", "run", "build" ]
publicDir = "artifacts/interlink/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25443"
BASE_PATH = "/"
